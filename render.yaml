services:
  - type: web
    runtime: node
    name: slaptax
    region: frankfurt
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: slaptax-db
          property: connectionString

databases:
  - name: slaptax-db
    region: frankfurt
    plan: free
    databaseName: slaptax
    user: slaptax
